changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - question
      - wontfix
  categories:
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 🚀 Enhancements
      labels:
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
    - title: 📝 Documentation
      labels:
        - documentation
