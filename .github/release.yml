changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - question
      - wontfix
  categories:
    - title: 🚀 Highlights
      labels:
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 📦 Dependency updates
      labels:
        - dependencies
