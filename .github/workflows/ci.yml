name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  UV_FROZEN: "1"
  UV_CACHE_DEPENDENCY_GLOB: |
    pyproject.toml
    uv.lock

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes / python
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect Python, uv, or CI changes
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            python:
              - '.github/workflows/ci.yml'
              - '.python-version'
              - 'Makefile'
              - '**/*.py'
              - '**/*.pyi'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'uv.toml'

  checks:
    name: checks / ubuntu / py3.14
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.14"
          enable-cache: true
          cache-python: true
          cache-suffix: checks
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Install development dependencies
        run: make install-python

      - name: Format check
        run: make format-check

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

  tests:
    name: tests / ubuntu / py${{ matrix.python-version }}
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-suffix: tests-${{ matrix.python-version }}
          cache-dependency-glob: ${{ env.UV_CACHE_DEPENDENCY_GLOB }}

      - name: Install development dependencies
        run: make install-python

      - name: Run tests
        run: make test

  required:
    name: required
    if: ${{ always() }}
    needs:
      - changes
      - checks
      - tests
    runs-on: ubuntu-latest

    steps:
      - name: Verify CI result
        run: |-
          echo "changes: ${{ needs.changes.result }}"
          echo "python changes: ${{ needs.changes.outputs.python }}"
          echo "checks: ${{ needs.checks.result }}"
          echo "tests: ${{ needs.tests.result }}"

          if [ "${{ needs.changes.result }}" != "success" ]; then
            exit 1
          fi

          if [ "${{ needs.changes.outputs.python }}" != "true" ]; then
            echo "No Python-related changes detected; skipping checks and tests."
            exit 0
          fi

          if [ "${{ needs.checks.result }}" != "success" ] || [ "${{ needs.tests.result }}" != "success" ]; then
            exit 1
          fi
